services:
  api-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: doc_intel_api
    environment:
      - ENV=production
      - LOG_LEVEL=INFO
      - ACTIVE_BACKEND=onnx
      - CLASSIFIER_VERSION=v1
      - DETECTOR_VERSION=v1
    volumes:
      # Mount the local models folder into the container to enable hot-swapping 
      # and rolling back model versions without rebuilds/re-deploys.
      - ./models:/app/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always

  nginx-gateway:
    image: nginx:alpine
    container_name: doc_intel_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-service
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: doc_intel_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api-service
    restart: always
