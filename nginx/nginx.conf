events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging settings
    log_format main_json escape=json '{'
        '"time_local":"$time_local",'
        '"client_ip":"$remote_addr",'
        '"request":"$request",'
        '"status": "$status",'
        '"body_bytes_sent":"$body_bytes_sent",'
        '"request_time":"$request_time",'
        '"http_referrer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"request_id":"$http_x_request_id"'
    '}';

    access_log /var/log/nginx/access.log main_json;
    error_log /var/log/nginx/error.log warn;

    # Rate limiting definition: 10 requests per minute per IP for the processing endpoint
    limit_req_zone $binary_remote_addr zone=proc_limit:10m rate=10r/m;
    # Rate limiting definition: 60 requests per minute per IP for other endpoints
    limit_req_zone $binary_remote_addr zone=general_limit:10m rate=60r/m;

    upstream app_server {
        server api-service:8000;
    }

    server {
        listen 80;
        server_name localhost;

        client_max_body_size 10M;

        # Health checks (no rate limits applied to ensure orchestration probes always pass)
        location /api/v1/health {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/ready {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Prometheus metrics scraping endpoint (restrict or open based on monitoring setup)
        location /metrics {
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # In production, you would restrict this to Prometheus server IPs:
            # allow 172.16.0.0/12; # example docker network range
            # deny all;
        }

        # Document processing endpoint - strictly rate-limited (10 requests/minute, burst 2)
        location /api/v1/process {
            limit_req zone=proc_limit burst=2 nodelay;
            limit_req_status 429;
            
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id; # Generate request ID if not provided
        }

        # General configuration and other API routes - rate-limited (60 requests/minute, burst 10)
        location / {
            limit_req zone=general_limit burst=10;
            limit_req_status 429;
            
            proxy_pass http://app_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
        }

        # Custom JSON error response for rate limits
        error_page 429 /429.json;
        location = /429.json {
            return 429 '{"error":"Too Many Requests","message":"Rate limit exceeded. Please slow down.","request_id":"$http_x_request_id"}';
            add_header Content-Type application/json;
        }
    }
}
